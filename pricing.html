<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing · SemeAI Gate SaaS</title>
    <meta name="description" content="SemeAI Gate pricing: Free, Starter, Growth, Scale, Enterprise. Stripe or USDT pilots." />
    <link rel="stylesheet" href="assets/css/site.css?v=20260717e" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      .price-grid {
        display: grid; gap: 1rem;
        grid-template-columns: 1fr;
      }
      @media (min-width: 900px) {
        .price-grid { grid-template-columns: repeat(3, 1fr); }
      }
      @media (min-width: 1100px) {
        .price-grid { grid-template-columns: repeat(5, 1fr); }
      }
      .price-card {
        border: 1px solid var(--line); border-radius: 1.1rem;
        background: var(--panel); padding: 1.25rem;
        display: flex; flex-direction: column; gap: 0.75rem;
      }
      .price-card.hot {
        border-color: rgba(34,211,238,0.45);
        box-shadow: 0 0 40px rgba(34,211,238,0.12);
      }
      .price-card h3 { margin: 0; color: #fff; font-size: 1.1rem; }
      .price-card .amt { font-size: 1.85rem; font-weight: 800; color: #fff; letter-spacing: -0.03em; }
      .price-card .amt small { font-size: 0.8rem; color: var(--faint); font-weight: 600; }
      .price-card ul { margin: 0; padding-left: 1.1rem; color: var(--mute); font-size: 0.84rem; line-height: 1.55; flex: 1; }
      .price-card li { margin-bottom: 0.3rem; }
    </style>
  </head>
  <body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <div class="vignette" aria-hidden="true"></div>
    <div class="content">
      <div data-semeai-nav></div>
      <main class="site-main">
        <span class="eyebrow">Pricing</span>
        <h1 class="page-title">Plans that scale with release control</h1>
        <p class="lead">
          Free to start. Paid tiers for seats, volume, and team workflows.
          Payment is never gate authority — SHOW / REVIEW / BLOCK stay independent.
        </p>
        <div class="btn-row mt-6">
          <a class="btn-primary" href="register.html?v=20260717e">Create account</a>
          <a class="btn-ghost" href="dashboard.html?v=20260717e">Open cabinet</a>
        </div>
        <div class="price-grid mt-10" id="plans"></div>
        <p class="mt-8" style="color:var(--faint);font-size:0.85rem" id="billing-note"></p>
      </main>
      <div data-semeai-footer></div>
    </div>
    <script src="assets/js/i18n.js?v=20260717e"></script>
    <script src="assets/js/api.js?v=20260717e"></script>
    <script src="assets/js/site-shell.js?v=20260717e"></script>
    <script>
      (async () => {
        const box = document.querySelector("#plans");
        try {
          const data = await SemeAI.plans();
          const providers = await SemeAI.authProviders().catch(() => ({}));
          const stripeOn = !!(providers.stripe && providers.stripe.enabled);
          document.querySelector("#billing-note").textContent = stripeOn
            ? "Stripe subscriptions available when price IDs are configured. USDT/TRC20 pilot billing remains available in the cabinet."
            : "Stripe secrets not configured yet — use Free signup or USDT pilot in the cabinet. Payment never controls gate decisions.";
          box.innerHTML = (data.plans || [])
            .map((p) => {
              const amt =
                p.price_usd == null
                  ? p.price_label
                  : p.price_usd === 0
                    ? "$0"
                    : `$${p.price_usd}<small>/${p.interval}</small>`;
              const cta = p.contact_only
                ? `<a class="btn-ghost" href="mailto:anton_semenenko@semeai.tech?subject=SemeAI%20Enterprise">Contact sales</a>`
                : p.id === "free"
                  ? `<a class="btn-primary" href="register.html?v=20260717e&plan=free">${p.cta || "Start"}</a>`
                  : `<a class="btn-primary" href="dashboard.html?v=20260717e&checkout=${p.id}">${p.cta || "Start"}</a>`;
              const feats = (p.features || []).map((f) => `<li>${f}</li>`).join("");
              return `<article class="price-card ${p.highlight ? "hot" : ""}">
                <h3>${p.name}</h3>
                <div class="amt">${amt}</div>
                <p style="margin:0;color:var(--mute);font-size:0.85rem">${p.tagline || ""}</p>
                <ul>${feats}</ul>
                ${cta}
              </article>`;
            })
            .join("");
        } catch (e) {
          box.innerHTML = `<p class="lead">${e.message || e}</p>`;
        }
      })();
    </script>
  </body>
</html>
