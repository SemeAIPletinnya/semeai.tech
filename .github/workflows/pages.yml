name: Deploy semeai.tech

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static landing files
        run: |
          test -f index.html
          test -f CNAME
          test -f .nojekyll
          ! test -f design-options.html

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
