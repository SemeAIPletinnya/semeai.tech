<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team invite · SemeAI</title>
    <link rel="stylesheet" href="assets/css/site.css?v=20260717e" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      .fld { width:100%; border:1px solid rgba(255,255,255,.1); border-radius:12px; background:rgba(3,3,6,.65); padding:.75rem .9rem; color:#fff; }
      .msg { border-radius:12px; border:1px solid rgba(255,255,255,.1); padding:.85rem 1rem; color:var(--mute); margin-top:1rem; }
      .msg.ok { color:var(--show); border-color:rgba(74,222,128,.35); background:rgba(74,222,128,.08); }
      .msg.error { color:var(--block); border-color:rgba(248,113,113,.4); background:rgba(248,113,113,.08); }
      .field-label { display:block; margin:0 0 .4rem; font-size:.7rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--faint); }
    </style>
  </head>
  <body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <div class="vignette" aria-hidden="true"></div>
    <div class="content">
      <div data-semeai-nav></div>
      <main class="site-main" style="max-width:28rem">
        <span class="eyebrow">Team</span>
        <h1 class="page-title">Accept workspace invite</h1>
        <p class="lead">Set a password to join the team (if you are new), then log in.</p>
        <form id="form" class="panel mt-8" style="display:grid;gap:1rem">
          <div>
            <label class="field-label" for="password">Password (new users)</label>
            <input class="fld" id="password" type="password" minlength="8" autocomplete="new-password" />
          </div>
          <button class="btn-primary" type="submit">Join workspace</button>
        </form>
        <div class="msg" id="msg">Invite token is read from the email link.</div>
      </main>
      <div data-semeai-footer></div>
    </div>
    <script src="assets/js/i18n.js?v=20260717e"></script>
    <script src="assets/js/api.js?v=20260717e"></script>
    <script src="assets/js/site-shell.js?v=20260717e"></script>
    <script>
      function tokenFromHash() {
        const h = location.hash || "";
        if (h.includes("token=")) return decodeURIComponent(h.split("token=")[1].split("&")[0]);
        return new URLSearchParams(location.search).get("token") || "";
      }
      document.querySelector("#form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const msg = document.querySelector("#msg");
        try {
          const data = await SemeAI.acceptInvite({
            token: tokenFromHash(),
            password: document.querySelector("#password").value || undefined,
          });
          msg.className = "msg ok";
          msg.textContent = `Joined ${data.workspace_name || data.workspace_id}. Redirecting…`;
          setTimeout(() => (location.href = "dashboard.html?v=20260717e"), 1200);
        } catch (err) {
          msg.className = "msg error";
          msg.textContent = err.message || String(err);
        }
      });
    </script>
  </body>
</html>
